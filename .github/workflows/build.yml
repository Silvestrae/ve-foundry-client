# .github/workflows/build-and-publish.yml
name: 📦 Build & Publish

# fire on every published release, or manual dispatch
on:
  release:
    types: [published]
  workflow_dispatch:
permissions:
  contents: write # needed to upload release assets

jobs:
  build:
    runs-on: windows-latest
    # allow electron-builder to upload to GitHub Releases
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v5

      - name: Setup Yarn
        uses: threeal/setup-yarn-action@v2.0.0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build main, preload & renderer
        run: yarn build

      - name: Package for Windows x64 and ia32
        run: npx electron-builder --win --x64 --ia32 --publish always

  # Build supported Linux packages separately so a Linux packaging failure does not block Windows output.
  build-linux:
    runs-on: ubuntu-latest
    # allow electron-builder to upload to GitHub Releases
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    strategy:
      matrix:
        # for multi-arch on Linux:
        arch: [x64, arm64]
      fail-fast: false
    steps:
      - uses: actions/checkout@v5

      - name: Setup Yarn
        uses: threeal/setup-yarn-action@v2.0.0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build main, preload & renderer
        run: yarn build

      - name: Package for Linux ${{ matrix.arch }}
        shell: bash
        run: |
          # determine the arch flag
          case "${{ matrix.arch }}" in
            "x64")    ARCH_FLAG="--x64" ;;
            "arm64")  ARCH_FLAG="--arm64" ;;
          esac

          # run electron-builder with publish
          npx electron-builder --linux "$ARCH_FLAG" --publish always

    # artifacts are automatically attached by electron-builder to the GitHub release

  build-macos:
    runs-on: macos-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CSC_IDENTITY_AUTO_DISCOVERY: false
    strategy:
      matrix:
        arch: [x64, arm64]
      fail-fast: false
    steps:
      - uses: actions/checkout@v5

      - name: Setup Yarn
        uses: threeal/setup-yarn-action@v2.0.0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build main, preload & renderer
        run: yarn build

      - name: Package for macOS ${{ matrix.arch }}
        run: npx electron-builder --mac --${{ matrix.arch }} --publish always
