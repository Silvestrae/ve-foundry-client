# .github/workflows/build-and-publish.yml
name: 📦 Build & Publish

# fire on every published release, or manual dispatch
on:
  workflow_dispatch:
permissions:
  contents: write # needed to upload release assets

jobs:
  build:
    runs-on: windows-latest
    # allow electron-builder to upload to GitHub Releases
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v5

      - name: Setup Yarn
        uses: threeal/setup-yarn-action@v2.0.0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build main, preload & renderer
        run: yarn build

      - name: Package for Windows x64
        run: npx electron-builder --win --x64 --publish always

    # artifacts are automatically attached by electron-builder to the GitHub release
